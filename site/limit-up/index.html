<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="近 30 天 Chengwaye 每日漲停代號、名稱與族群紀錄">
  <title>每日漲停紀錄</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <nav class="app-switcher" aria-label="功能切換">
      <a href="../">族群記分板</a>
      <a href="../aistockmap/">AI Stock Map 每日資料</a>
      <a class="active" href="./">每日漲停紀錄</a>
      <a href="../rotation-focus/">族群輪動焦點</a>
    </nav>

    <header>
      <p class="eyebrow">CHENGWAYE DAILY ARCHIVE</p>
      <h1>每日漲停紀錄</h1>
      <p class="sub">保存漲停區塊的代號、名稱與族群，提供最近 30 天查詢。</p>
    </header>

    <section class="toolbar">
      <label for="record-date">查看日期</label>
      <select id="record-date"></select>
      <span id="status" role="status" aria-live="polite"></span>
    </section>

    <section class="summary" aria-live="polite">
      <div>
        <span class="summary-label">交易日期</span>
        <strong id="summary-date">—</strong>
      </div>
      <div>
        <span class="summary-label">漲停家數</span>
        <strong id="summary-count">—</strong>
      </div>
      <div>
        <span class="summary-label">族群數量</span>
        <strong id="summary-groups">—</strong>
      </div>
    </section>

    <div id="group-list" class="group-list" aria-label="族群摘要"></div>

    <section class="table-card">
      <div class="table-heading">
        <h2>漲停清單</h2>
        <a id="source-link" href="https://chengwaye.com/daily" target="_blank" rel="noopener">查看來源頁面</a>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>代號</th><th>名稱</th><th>族群</th></tr>
          </thead>
          <tbody id="records"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="viewer.js?v=1"></script>
</body>
</html>
