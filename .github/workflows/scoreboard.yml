name: Monitor and deploy scoreboard

on:
  push:
    branches: [main]
  schedule:
    # 18:07 Asia/Taipei = 10:07 UTC, Monday-Friday. Avoid GitHub Actions top-of-hour schedule drops.
    - cron: '7 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sector-scoreboard-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: windows-latest
    timeout-minutes: 355
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Monitor date-specific Chengwaye page
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        id: monitor
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $taipeiDate = [DateTime]::UtcNow.AddHours(8).ToString('yyyyMMdd')
          $sourceUrl = "https://chengwaye.com/nextday-performance-$taipeiDate"
          $jsonPath = Join-Path $PWD 'site/sector_scoreboard.json'
          $baseline = ''
          if (Test-Path $jsonPath) {
            $baselineJson = (Get-Content -Raw -Encoding UTF8 $jsonPath).TrimStart([char]0xFEFF) | ConvertFrom-Json
            $baseline = $baselineJson.nextDate
          }

          $deadline = (Get-Date).AddMinutes(345)
          Write-Host "Target URL: $sourceUrl"
          Write-Host "Current deployed nextDate: $baseline"

          while ((Get-Date) -lt $deadline) {
            try {
              $probeDir = Join-Path $PWD 'probe_site'
              & ./update_sector_scoreboard.ps1 -Url $sourceUrl -OutputDirectory $probeDir
              $probeJsonPath = Join-Path $probeDir 'sector_scoreboard.json'
              $probeJson = (Get-Content -Raw -Encoding UTF8 $probeJsonPath).TrimStart([char]0xFEFF) | ConvertFrom-Json
              $sourceDate = $probeJson.nextDate
              Write-Host "$(Get-Date -Format 'HH:mm:ss') source nextDate: $sourceDate"

              if ([string]::IsNullOrWhiteSpace($baseline) -or $sourceDate -ne $baseline) {
                Copy-Item (Join-Path $probeDir 'sector_scoreboard.html') (Join-Path $PWD 'site/sector_scoreboard.html') -Force
                Copy-Item (Join-Path $probeDir 'sector_scoreboard.csv') (Join-Path $PWD 'site/sector_scoreboard.csv') -Force
                Copy-Item (Join-Path $probeDir 'sector_scoreboard.json') (Join-Path $PWD 'site/sector_scoreboard.json') -Force
                Copy-Item (Join-Path $PWD 'site/sector_scoreboard.html') (Join-Path $PWD 'site/index.html') -Force

                $updated = (Get-Content -Raw -Encoding UTF8 $jsonPath).TrimStart([char]0xFEFF) | ConvertFrom-Json
                if ($updated.nextDate -ne $sourceDate) {
                  throw "Update verification failed: json=$($updated.nextDate), source=$sourceDate"
                }
                "changed=true" >> $env:GITHUB_OUTPUT
                "source_date=$sourceDate" >> $env:GITHUB_OUTPUT
                Write-Host 'Update completed. Stop monitoring for today.'
                break
              }
            } catch {
              Write-Warning "Check failed: $($_.Exception.Message). Retry after 5 minutes."
            }
            Start-Sleep -Seconds 300
          }

          if ((Get-Date) -ge $deadline) {
            Write-Warning 'No new source data was detected within this monitoring window.'
            "changed=false" >> $env:GITHUB_OUTPUT
          }

      - name: Commit updated scoreboard
        if: steps.monitor.outputs.changed == 'true'
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add site
          git commit -m "Update scoreboard ${{ steps.monitor.outputs.source_date }}"
          git push

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
