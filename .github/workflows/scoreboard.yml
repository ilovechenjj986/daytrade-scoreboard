name: Monitor and deploy scoreboard

on:
  push:
    branches: [main]
  schedule:
    # 18:00 Asia/Taipei = 10:00 UTC, Monday-Friday
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sector-scoreboard-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: windows-latest
    timeout-minutes: 355
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Monitor source after 18:00
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        id: monitor
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $jsonPath = Join-Path $PWD 'site\sector_scoreboard.json'
          $baseline = ''
          if (Test-Path $jsonPath) {
            $baseline = (Get-Content -Raw $jsonPath | ConvertFrom-Json).nextDate
          }
          $deadline = (Get-Date).AddMinutes(345)
          Write-Host "目前已同步隔日日期：$baseline"

          while ((Get-Date) -lt $deadline) {
            try {
              $response = Invoke-WebRequest -Uri 'https://chengwaye.com/nextday-performance' -UseBasicParsing -TimeoutSec 45 -Headers @{
                'User-Agent' = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) GitHubActions-SectorScoreboard/1.0'
                'Cache-Control' = 'no-cache'
              }
              $match = [regex]::Match($response.Content, '漲停日\s*(?<limit>\d{4}/\d{2}/\d{2})\s*(?:→|&rarr;)\s*隔日\s*(?<next>\d{4}/\d{2}/\d{2})')
              if (-not $match.Success) { throw '來源頁找不到漲停日／隔日日期' }
              $sourceDate = $match.Groups['next'].Value
              Write-Host "$(Get-Date -Format 'HH:mm:ss') 來源隔日日期：$sourceDate"

              if ([string]::IsNullOrWhiteSpace($baseline) -or $sourceDate -ne $baseline) {
                & .\update_sector_scoreboard.ps1 -OutputDirectory (Join-Path $PWD 'site')
                Copy-Item .\site\sector_scoreboard.html .\site\index.html -Force
                $updated = Get-Content -Raw $jsonPath | ConvertFrom-Json
                if ($updated.nextDate -ne $sourceDate) {
                  throw "更新驗證失敗：JSON=$($updated.nextDate)，來源=$sourceDate"
                }
                "changed=true" >> $env:GITHUB_OUTPUT
                "source_date=$sourceDate" >> $env:GITHUB_OUTPUT
                Write-Host "更新完成，停止本日監控。"
                break
              }
            } catch {
              Write-Warning "檢查失敗：$($_.Exception.Message)；5 分鐘後重試。"
            }
            Start-Sleep -Seconds 300
          }

          if ((Get-Date) -ge $deadline) {
            Write-Warning '本次監控期限內未發現新資料。'
            "changed=false" >> $env:GITHUB_OUTPUT
          }

      - name: Commit updated scoreboard
        if: steps.monitor.outputs.changed == 'true'
        shell: powershell
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add site
          git commit -m "Update scoreboard ${{ steps.monitor.outputs.source_date }}"
          git push

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4